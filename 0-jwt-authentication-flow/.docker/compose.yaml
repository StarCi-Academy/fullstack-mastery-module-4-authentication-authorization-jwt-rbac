# Stack hạ tầng bài 0-jwt-authentication-flow — chỉ infra, backend chạy local (nest start).
# (EN: Infrastructure stack for 0-jwt-authentication-flow — infra only, backend runs locally.)
#
# Thư mục: cd fullstack-mastery-module-4-authentication-authorization-jwt-rbac/0-jwt-authentication-flow/.docker
# (EN: Working dir: cd fullstack-mastery-module-4-authentication-authorization-jwt-rbac/0-jwt-authentication-flow/.docker)
#
# Khởi chạy: docker compose up -d
# (EN: Start: docker compose up -d)
#
# Dừng & xóa: docker compose down -v
# (EN: Stop & clean: docker compose down -v)
name: 0-jwt-authentication-flow

services:
  # PostgreSQL — persistence cho bài học (TypeORM — users, sessions).
  # (EN: PostgreSQL — persistence for the lesson (TypeORM — users, sessions).)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starci_user
      POSTGRES_PASSWORD: starci_password
      POSTGRES_DB: starci_db
    ports:
      # Ánh xạ cổng host 5432 → container 5432 (PostgreSQL).
      # (EN: Map host port 5432 → container 5432 (PostgreSQL).)
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

networks:
  0-jwt-authentication-flow:
    name: 0-jwt-authentication-flow

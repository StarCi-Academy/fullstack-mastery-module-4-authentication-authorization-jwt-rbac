# Stack hạ tầng bài 3-oauth2-google-login — chỉ infra, backend chạy local (nest start).
# (EN: Infrastructure stack for 3-oauth2-google-login — infra only, backend runs locally.)
#
# Thư mục: cd fullstack-mastery-module-4-authentication-authorization-jwt-rbac/3-oauth2-google-login/.docker
# (EN: Working dir: cd fullstack-mastery-module-4-authentication-authorization-jwt-rbac/3-oauth2-google-login/.docker)
#
# Khởi chạy: docker compose up -d
# (EN: Start: docker compose up -d)
#
# Dừng & xóa: docker compose down -v
# (EN: Stop & clean: docker compose down -v)
name: 3-oauth2-google-login

services:
  # PostgreSQL — persistence cho bài học (TypeORM — users, OAuth profiles).
  # (EN: PostgreSQL — persistence for the lesson (TypeORM — users, OAuth profiles).)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starci_user
      POSTGRES_PASSWORD: starci_password
      POSTGRES_DB: starci_db
    ports:
      # Ánh xạ cổng host 5432 → container 5432 (PostgreSQL).
      # (EN: Map host port 5432 → container 5432 (PostgreSQL).)
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

networks:
  3-oauth2-google-login:
    name: 3-oauth2-google-login
